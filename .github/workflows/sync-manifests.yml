name: Sync Manifests Cache

on:
  schedule:
    # BJT 6-16点每小时运行一次 (UTC+8)
    - cron: '0 22-23,0-6 * * *'  # UTC时间，对应BJT 6-16点
  workflow_dispatch:  # 支持手动触发

jobs:
  sync-manifests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: |
        npm init -y
        npm install node-fetch

    - name: Create cache directory
      run: |
        mkdir -p manifest-cache/domains
        mkdir -p manifest-cache/logs

    - name: Sync manifests
      id: sync
      run: |
        node sync-manifests.js
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Commit and push changes
      if: steps.sync.outputs.has_changes == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add manifest-cache/
        git commit -m "chore: 更新manifest缓存 [$(date '+%Y-%m-%d %H:%M:%S')]"
        git push

    - name: Log sync results
      run: |
        echo "同步完成时间: $(date)"
        echo "成功同步: ${{ steps.sync.outputs.success_count }} 个"
        echo "失败: ${{ steps.sync.outputs.failure_count }} 个"