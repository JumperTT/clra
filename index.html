<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLRA 分发平台</title>

    <!-- 外部样式文件 -->
    <link rel="stylesheet" href="styles.css">

    <!-- Font Awesome for icons - 使用镜像源 -->
    <link rel="stylesheet" href="https://ajax.loli.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- 缓存状态样式 -->
    <style>
        .cache-status {
            position: fixed;
            top: 80px;
            right: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 15px;
            font-size: 12px;
            color: var(--text-secondary);
            z-index: 999;
            box-shadow: var(--shadow);
        }

        .cache-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .cache-fresh { background: #28a745; }
        .cache-stale { background: #ffc107; }
        .cache-error { background: #dc3545; }

        .last-update {
            margin-top: 4px;
            font-size: 10px;
            opacity: 0.8;
        }
    </style>

</head>

<body>
    <div class="theme-toggle" id="themeToggle">
        <i class="fas fa-moon"></i>
    </div>

    <!-- 调试信息面板 -->
    <div class="debug-toggle" id="debugToggle">
        <i class="fas fa-bug"></i>
    </div>

    <div class="debug-info" id="debugInfo">
        <div class="debug-header">
            <strong>调试信息</strong>
            <button id="clearDebug"
                style="margin-left: 10px; background: none; border: none; color: var(--accent-color); cursor: pointer;">
                清除
            </button>
        </div>
        <div class="debug-content" id="debugContent"></div>
    </div>

    <div class="container">
        <header>
            <h1><i class="fas fa-tools"></i> CLRA 工具分发平台</h1>
            <p>发现并下载优质工具，提升您的工作效率</p>
        </header>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在加载工具列表...</p>
        </div>

        <div class="error-message" id="errorMessage">
            <i class="fas fa-exclamation-triangle"></i>
            <h3>加载失败</h3>
            <p>无法加载工具列表，请检查网络连接或联系管理员</p>

            <div class="cors-info">
                <h4><i class="fas fa-info-circle"></i> 常见加载问题</h4>
                <ul>
                    <li><strong>跨域请求被阻止</strong> - 服务器需要配置CORS策略</li>
                    <li><strong>网络连接失败</strong> - 检查网络连接和域名是否可达</li>
                    <li><strong>工具清单不存在</strong> - 确认域名下有 clra_manifest.json 或 jfkl_manifest.json 文件</li>
                    <li><strong>泛域名解析失败</strong> - 检查域名格式是否正确</li>
                </ul>
                <p style="margin-top: 10px;">点击右下角的 <i class="fas fa-bug"></i> 按钮查看详细调试信息</p>
            </div>
        </div>

        <div class="tools-grid" id="toolsGrid">
            <!-- 工具卡片将通过JavaScript动态生成 -->
        </div>

        <footer>
            <p>&copy; 2026 CLRA（机房抗联）工具分发平台</p>
        </footer>
    </div>

    <script>
        /**
         * CLRA 工具分发平台
         * 版本: 1.0.0
         * 功能: 从配置文件读取域名，动态拉取并展示工具信息
         */

        (function () {
            'use strict';

            // 全局状态管理
            const state = {
                wildcardCache: new Map(), // 泛域名缓存
                tools: [], // 工具列表
                theme: localStorage.getItem('theme') || 'light',
                debugMode: false,
                debugLogs: []
            };

            // 调试工具函数
            const debug = {
                log: function (message, type = 'info') {
                    const timestamp = new Date().toLocaleTimeString();
                    const logEntry = {
                        timestamp,
                        message,
                        type
                    };

                    state.debugLogs.push(logEntry);

                    // 控制台输出
                    const consoleMethod = type === 'error' ? console.error :
                        type === 'warn' ? console.warn :
                            console.log;
                    consoleMethod(`[CLRA] ${timestamp}: ${message}`);

                    // 更新调试面板
                    this.updatePanel();
                },

                updatePanel: function () {
                    if (!state.debugMode) return;

                    let html = '';
                    for (const log of state.debugLogs.slice(-20)) { // 只显示最近20条
                        html += `<div style="margin-bottom: 5px; padding: 4px; border-left: 3px solid ${this.getColorForType(log.type)}; background: rgba(0,0,0,0.05);">
                                    <span style="color: #666; font-size: 10px;">${log.timestamp}</span>
                                    <span style="margin-left: 8px;">${this.escapeHtml(log.message)}</span>
                                </div>`;
                    }

                    const debugContent = document.getElementById('debugContent');
                    if (debugContent) {
                        debugContent.innerHTML = html;
                    }
                },

                getColorForType: function (type) {
                    switch (type) {
                        case 'error': return '#ef4444';
                        case 'warn': return '#f59e0b';
                        case 'success': return '#10b981';
                        default: return '#3b82f6';
                    }
                },

                escapeHtml: function (text) {
                    const div = document.createElement('div');
                    div.textContent = text;
                    return div.innerHTML;
                },

                clear: function () {
                    state.debugLogs = [];
                    const debugContent = document.getElementById('debugContent');
                    if (debugContent) {
                        debugContent.innerHTML = '';
                    }
                }
            };

            /**
             * 生成随机字符串用于泛域名替换
             * @param {number} length - 字符串长度，默认为16
             * @returns {string} 随机字符串
             */
            function generateRandomString(length = 16) {
                const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-_';
                let result = '';
                for (let i = 0; i < length; i++) {
                    result += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                return result;
            }

            /**
             * 处理泛域名，将 * 替换为随机字符串
             * @param {string} domain - 原始域名
             * @returns {string} 处理后的域名
             */
            function processWildcardDomain(domain) {
                if (!domain.includes('*')) {
                    return domain;
                }

                // 检查内存缓存
                if (state.wildcardCache.has(domain)) {
                    const cached = state.wildcardCache.get(domain);
                    debug.log(`从缓存获取泛域名解析: ${domain} -> ${cached}`);
                    return cached;
                }

                // 使用固定的生成逻辑来确保前后端一致
                // 这确保相同的泛域名总是生成相同的结果
                const fixedString = generateFixedWildcardString(domain);
                const processedDomain = domain.replace(/\*/g, fixedString);

                // 缓存结果
                state.wildcardCache.set(domain, processedDomain);

                debug.log(`泛域名解析: ${domain} -> ${processedDomain}`);
                return processedDomain;
            }

            /**
             * 生成固定的泛域名替换字符串（与后端保持一致）
             * @param {string} wildcardDomain - 泛域名
             * @returns {string} 16位固定字符串
             */
            function generateFixedWildcardString(wildcardDomain) {
                // 使用域名作为种子，生成固定的16位字符串
                // 这确保相同的泛域名总是生成相同的结果
                let hash = 0;
                for (let i = 0; i < wildcardDomain.length; i++) {
                    const char = wildcardDomain.charCodeAt(i);
                    hash = ((hash << 5) - hash) + char;
                    hash = hash & hash; // 转换为32位整数
                }

                // 生成16位固定字符串
                const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
                let result = '';
                let seed = Math.abs(hash);

                for (let i = 0; i < 16; i++) {
                    seed = (seed * 9301 + 49297) % 233280;
                    result += chars.charAt(seed % chars.length);
                }

                return result;
            }

            /**
             * 确保URL有HTTPS协议
             * @param {string} url - 原始URL
             * @returns {string} 带HTTPS协议的URL
             */
            function processUrl(url, useHttps = true) {
                if (!url) return '';
                if (url.startsWith('http://') || url.startsWith('https://')) {
                    return url;
                }
                return useHttps ? `https://${url}` : `http://${url}`;
            }

            /**
             * 转义HTML特殊字符，防止XSS
             * @param {string} text - 原始文本
             * @returns {string} 转义后的文本
             */
            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            /**
             * 解析下载URL格式
             * @param {string|Array} downloadUrl - 下载URL配置
             * @returns {Array} 解析后的下载按钮数组
             */
            function parseDownloadUrls(downloadUrl) {
                if (!downloadUrl) return [];

                // 如果是字符串，直接解析
                if (typeof downloadUrl === 'string') {
                    const colonIndex = downloadUrl.indexOf(':');
                    if (colonIndex !== -1) {
                        const text = downloadUrl.substring(0, colonIndex).trim();
                        const url = downloadUrl.substring(colonIndex + 1).trim();
                        return [{ text, url }];
                    }
                    return [{ text: '下载', url: downloadUrl }];
                }

                // 如果是数组，解析每个元素
                if (Array.isArray(downloadUrl)) {
                    return downloadUrl.map(item => {
                        if (typeof item === 'string') {
                            const colonIndex = item.indexOf(':');
                            if (colonIndex !== -1) {
                                const text = item.substring(0, colonIndex).trim();
                                const url = item.substring(colonIndex + 1).trim();
                                return { text, url };
                            }
                            return { text: '下载', url: item };
                        }
                        return { text: '下载', url: item };
                    });
                }

                return [];
            }

            /**
             * 创建工具卡片HTML
             * @param {Object} tool - 工具信息
             * @returns {string} 工具卡片HTML
             */
            function createToolCard(tool) {
                const escapedName = escapeHtml(tool.name);
                const escapedDeveloper = escapeHtml(tool.developer);
                const escapedDescription = escapeHtml(tool.description).replace(/\\n/g, '<br>');
                const escapedUpdateContent = tool.update_content ? escapeHtml(tool.update_content) : '';

                // 处理URL（缓存中的域名已经过处理，但URL中的泛域名还需要处理）
                const iconUrl = tool.icon_url ? processUrl(processWildcardDomain(tool.icon_url)) : null;
                const projectUrl = tool.url ? processUrl(processWildcardDomain(tool.url)) : null;

                // 解析下载按钮
                const downloadButtons = parseDownloadUrls(tool.download_url);

                let downloadButtonsHtml = '';
                downloadButtons.forEach(btn => {
                    const processedUrl = processUrl(processWildcardDomain(btn.url));
                    downloadButtonsHtml += `
                        <a href="${escapeHtml(processedUrl)}" class="btn btn-secondary" target="_blank" rel="noopener noreferrer">
                            <i class="fas fa-download"></i> ${escapeHtml(btn.text)}
                        </a>
                    `;
                });

                // 检查工具加载状态
                const isError = tool.isError;
                const isFallback = tool._fallback_loaded === true;
                const cardClass = isError ? 'tool-card error-card' : (isFallback ? 'tool-card fallback-card' : 'tool-card');
                const iconClass = isError ? 'fas fa-exclamation-triangle' : (isFallback ? 'fas fa-wifi' : 'fas fa-cogs');
                const iconColor = isError ? '#dc3545' : (isFallback ? '#ff9500' : 'var(--accent-color)');

                return `
                    <div class="${cardClass}">
                        <div class="tool-header">
                            <div class="tool-icon" style="background: ${isError ? 'rgba(220, 53, 69, 0.1)' : 'var(--bg-secondary)'};">
                                ${iconUrl ? `<img src="${iconUrl}" alt="${escapedName}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">` : ''}
                                <i class="${iconClass}" style="display: ${iconUrl ? 'none' : 'flex'}; color: ${iconColor};"></i>
                            </div>
                            <div class="tool-info">
                                <h3 style="color: ${isError ? '#dc3545' : 'var(--text-primary)'};">${escapedName}</h3>
                                <div class="tool-meta">
                                    <span class="version-badge" style="background: ${isError ? '#dc3545' : (isFallback ? '#ff9500' : 'var(--accent-color)')};">
                                        ${isError ? '错误' : (isFallback ? '实时' : `v${escapeHtml(tool.version)}`)}
                                    </span>
                                    <span class="developer">by ${escapedDeveloper}</span>
                                    ${isFallback ? '<span class="developer" style="color: #ff9500;">(回退加载)</span>' : ''}
                                </div>
                            </div>
                        </div>

                        <div class="tool-description" style="color: ${isError ? '#dc3545' : 'var(--text-secondary)'};">${escapedDescription}</div>

                        ${escapedUpdateContent ? `<div class="update-content"><strong>更新内容:</strong><br>${escapedUpdateContent}</div>` : ''}

                        <div class="tool-actions">
                            ${!isError && projectUrl ? `<a href="${escapeHtml(projectUrl)}" class="btn btn-primary" target="_blank" rel="noopener noreferrer">
                                <i class="fas fa-external-link-alt"></i> 项目主页
                            </a>` : ''}
                            ${!isError ? downloadButtonsHtml : ''}
                        </div>
                    </div>
                `;
            }

            /**
             * 渲染工具列表
             */
            function renderTools() {
                const toolsGrid = document.getElementById('toolsGrid');
                const loading = document.getElementById('loading');
                const errorMessage = document.getElementById('errorMessage');

                if (state.tools.length === 0) {
                    loading.classList.remove('active');
                    errorMessage.classList.add('active');
                    return;
                }

                // 按工具名称排序
                state.tools.sort((a, b) => a.name.localeCompare(b.name));

                const toolsHtml = state.tools.map(tool => createToolCard(tool)).join('');
                toolsGrid.innerHTML = toolsHtml;

                loading.classList.remove('active');
            }

            /**
             * 从缓存加载工具清单
             * @param {string} domain - 原始域名
             * @returns {Promise<Object>} 工具信息
             */
            async function fetchManifestFromCache(domain) {
                try {
                    // 生成缓存文件名（安全处理特殊字符）
                    // 尝试两种可能的缓存文件名格式（clra_manifest.json 和 jfkl_manifest.json）
                    const safeDomain = domain.replace(/[\\/:*?"<>|.-]/g, '_');

                    // 尝试两种清单文件名的缓存
                    const manifestTypes = ['clra_manifest', 'jfkl_manifest'];
                    let cachedData = null;
                    let usedCacheFile = null;

                    for (const manifestType of manifestTypes) {
                        const cacheFileName = `${safeDomain}_${manifestType}.json`;
                        const cacheUrl = `/manifest-cache/domains/${cacheFileName}`;

                        debug.log(`正在从缓存加载清单: ${cacheUrl}`);

                        try {
                            const response = await fetch(cacheUrl);

                            if (response.ok) {
                                cachedData = await response.json();
                                usedCacheFile = cacheFileName;
                                break;
                            }
                        } catch (error) {
                            debug.log(`缓存文件不存在: ${cacheUrl}`, 'warn');
                            continue;
                        }
                    }

                    if (!cachedData) {
                        throw new Error(`没有找到缓存文件: ${domain}`);
                    }

                    debug.log(`成功从缓存加载工具: ${cachedData.name} (缓存文件: ${usedCacheFile})`, 'success');
                    return cachedData;

                } catch (error) {
                    debug.log(`缓存加载失败 ${domain}: ${error.message}`, 'warn');
                    debug.log(`正在回退到直接请求原始服务器: ${domain}`);

                    // 回退到直接请求原始服务器
                    return await fetchManifestDirect(domain);
                }
            }

            /**
             * 直接请求原始服务器的工具清单（回退机制）
             * @param {string} domain - 域名
             * @returns {Promise<Object>} 工具信息
             */
            async function fetchManifestDirect(domain) {
                const processedDomain = processWildcardDomain(domain);

                // 尝试两种文件名
                const manifestFiles = ['clra_manifest.json', 'jfkl_manifest.json'];
                let lastError = null;

                for (const filename of manifestFiles) {
                    // 先尝试HTTPS
                    try {
                        const httpsUrl = `https://${processedDomain}/${filename}`;
                        debug.log(`回退: 正在尝试HTTPS加载清单: ${httpsUrl}`);

                        const response = await fetch(httpsUrl, {
                            mode: 'cors',
                            headers: {
                                'Accept': 'application/json'
                            }
                        });

                        if (!response.ok) {
                            if (response.status === 404) {
                                debug.log(`回退: 清单文件不存在: ${httpsUrl}`, 'warn');
                                continue; // 尝试下一个文件名
                            }
                            throw new Error(`HTTP ${response.status} - ${response.statusText}`);
                        }

                        const manifest = await response.json();
                        debug.log(`回退: 成功加载清单: ${domain} (${filename})`, 'success');

                        // 标记为回退加载的工具
                        manifest._fallback_loaded = true;
                        return manifest;
                    } catch (httpsError) {
                        debug.log(`回退: HTTPS请求失败，尝试HTTP: ${httpsError.message}`, 'warn');

                        // 如果HTTPS失败，尝试HTTP
                        try {
                            const httpUrl = `http://${processedDomain}/${filename}`;
                            debug.log(`回退: 正在尝试HTTP加载: ${httpUrl}`);

                            const response = await fetch(httpUrl, {
                                mode: 'cors',
                                headers: {
                                    'Accept': 'application/json'
                                }
                            });

                            if (!response.ok) {
                                if (response.status === 404) {
                                    debug.log(`回退: 清单文件不存在: ${httpUrl}`, 'warn');
                                    continue; // 尝试下一个文件名
                                }
                                throw new Error(`HTTP ${response.status} - ${response.statusText}`);
                            }

                            const manifest = await response.json();
                            debug.log(`回退: 成功加载清单(HTTP): ${domain} (${filename})`, 'success');

                            // 标记为回退加载的工具
                            manifest._fallback_loaded = true;
                            return manifest;
                        } catch (httpError) {
                            debug.log(`回退: HTTP请求也失败: ${httpError.message}`, 'warn');
                            lastError = httpsError; // 记录HTTPS错误作为主要错误
                            continue; // 尝试下一个文件名
                        }
                    }
                }

                // 所有方法都失败
                let errorMessage = lastError ? lastError.message : '未知错误';

                // 提供更友好的错误信息
                if (errorMessage.includes('CORS') || errorMessage.includes('Access-Control-Allow-Origin')) {
                    errorMessage = '跨域请求被阻止 - 请联系工具提供者配置CORS策略';
                } else if (errorMessage.includes('Failed to fetch') || errorMessage.includes('network')) {
                    errorMessage = '网络连接失败 - 请检查网络连接或域名是否可达';
                } else if (errorMessage.includes('HTTP 404') || errorMessage.includes('清单文件不存在')) {
                    errorMessage = '工具清单文件不存在 - 请确认域名下有 clra_manifest.json 或 jfkl_manifest.json 文件';
                }

                debug.log(`回退: 加载清单失败 ${domain}: ${errorMessage}`, 'error');

                // 创建错误工具卡片信息
                return {
                    name: `加载失败: ${domain}`,
                    developer: '系统',
                    version: 'N/A',
                    description: `无法加载此工具\n原因: ${errorMessage}\n\n请检查:\n1. 网络连接是否正常\n2. 域名配置是否正确\n3. 域名下是否有 clra_manifest.json 或 jfkl_manifest.json 文件\n4. 联系工具提供者解决CORS问题`,
                    update_content: null,
                    url: null,
                    download_url: [],
                    icon_url: null,
                    isError: true
                };
            }

            /**
             * 读取并解析配置文件
             * @returns {Promise<Array>} 域名列表
             */
            async function loadConfig() {
                try {
                    debug.log('正在加载配置文件: clra_urls.txt');
                    const response = await fetch('./clra_urls.txt');
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const text = await response.text();
                    const domains = text
                        .split('\n')
                        .map(line => line.trim())
                        .filter(line => line && !line.startsWith('#'));

                    debug.log(`成功加载 ${domains.length} 个域名配置`, 'success');
                    return domains;
                } catch (error) {
                    debug.log(`加载配置文件失败: ${error.message}`, 'error');
                    return [];
                }
            }

            /**
             * 加载缓存元数据
             * @returns {Promise<Object>} 缓存元数据
             */
            async function loadCacheMetadata() {
                try {
                    debug.log('正在加载缓存元数据');
                    const response = await fetch('/manifest-cache/metadata.json');

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const metadata = await response.json();
                    debug.log(`缓存元数据加载成功，最后同步时间: ${metadata.last_sync}`, 'success');
                    return metadata;
                } catch (error) {
                    debug.log(`缓存元数据加载失败: ${error.message}`, 'warn');
                    return null;
                }
            }

            /**
             * 更新缓存状态显示
             * @param {Object} metadata - 缓存元数据
             */
            function updateCacheStatus(metadata) {
                let statusHtml = '';

                if (!metadata) {
                    statusHtml = `
                        <div class="cache-status">
                            <div style="display: flex; align-items: center;">
                                <span class="cache-indicator cache-error"></span>
                                缓存状态: 不可用
                            </div>
                            <div class="last-update">缓存元数据加载失败</div>
                        </div>
                    `;
                } else {
                    const lastSync = new Date(metadata.last_sync);
                    const now = new Date();
                    const diffHours = Math.floor((now - lastSync) / (1000 * 60 * 60));

                    let statusClass = 'cache-fresh';
                    let statusText = '缓存正常';

                    if (diffHours > 2) {
                        statusClass = 'cache-stale';
                        statusText = '缓存较旧';
                    }
                    if (diffHours > 24) {
                        statusClass = 'cache-error';
                        statusText = '缓存过期';
                    }

                    statusHtml = `
                        <div class="cache-status">
                            <div style="display: flex; align-items: center;">
                                <span class="cache-indicator ${statusClass}"></span>
                                缓存状态: ${statusText}
                            </div>
                            <div class="last-update">最后同步: ${lastSync.toLocaleString()}</div>
                            <div class="last-update">工具数量: ${metadata.total_tools}</div>
                        </div>
                    `;
                }

                // 插入缓存状态到页面
                const existingStatus = document.querySelector('.cache-status');
                if (existingStatus) {
                    existingStatus.outerHTML = statusHtml;
                } else {
                    document.body.insertAdjacentHTML('afterbegin', statusHtml);
                }
            }

            /**
             * 初始化应用
             */
            async function init() {
                const loading = document.getElementById('loading');
                loading.classList.add('active');

                try {
                    debug.log('应用初始化开始');

                    // 首先加载缓存元数据并显示状态
                    const metadata = await loadCacheMetadata();
                    updateCacheStatus(metadata);

                    // 加载配置文件
                    const domains = await loadConfig();
                    if (domains.length === 0) {
                        throw new Error('没有找到有效的域名配置');
                    }

                    // 并行从缓存加载所有工具清单
                    const manifestPromises = domains.map(domain => fetchManifestFromCache(domain));
                    const manifests = await Promise.all(manifestPromises);

                    // 过滤成功的结果并去重
                    const validManifests = manifests.filter(manifest => manifest !== null);

                    // 根据工具名称去重，保留第一个出现的工具
                    const uniqueTools = [];
                    const toolNames = new Set();

                    for (const manifest of validManifests) {
                        if (!toolNames.has(manifest.name)) {
                            uniqueTools.push(manifest);
                            toolNames.add(manifest.name);
                        } else {
                            debug.log(`发现重复工具: ${manifest.name}，已跳过`, 'warn');
                        }
                    }

                    state.tools = uniqueTools;

                    // 统计加载方式
                    const cachedTools = state.tools.filter(tool => !tool._fallback_loaded && !tool.isError).length;
                    const fallbackTools = state.tools.filter(tool => tool._fallback_loaded).length;
                    const errorTools = state.tools.filter(tool => tool.isError).length;

                    debug.log(`加载完成: 缓存工具 ${cachedTools} 个, 回退工具 ${fallbackTools} 个, 错误工具 ${errorTools} 个`, 'success');

                    // 如果有回退加载的工具，更新缓存状态显示
                    if (fallbackTools > 0) {
                        const fallbackStatus = document.querySelector('.cache-status');
                        if (fallbackStatus) {
                            fallbackStatus.innerHTML += `
                                <div class="last-update" style="color: #ff9500; margin-top: 8px;">
                                    ⚠ ${fallbackTools} 个工具使用实时加载
                                </div>
                            `;
                        }
                    }

                    renderTools();

                } catch (error) {
                    debug.log(`初始化失败: ${error.message}`, 'error');
                    const loading = document.getElementById('loading');
                    const errorMessage = document.getElementById('errorMessage');
                    loading.classList.remove('active');
                    errorMessage.classList.add('active');
                }
            }

            /**
             * 切换主题
             */
            function toggleTheme() {
                state.theme = state.theme === 'light' ? 'dark' : 'light';
                document.body.classList.toggle('dark-theme', state.theme === 'dark');
                localStorage.setItem('theme', state.theme);

                const themeToggle = document.getElementById('themeToggle');
                const icon = themeToggle.querySelector('i');
                icon.className = state.theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
            }

            /**
             * 初始化主题
             */
            function initTheme() {
                if (state.theme === 'dark') {
                    document.body.classList.add('dark-theme');
                    const icon = document.querySelector('#themeToggle i');
                    icon.className = 'fas fa-sun';
                }
            }

            // 调试面板切换
            function toggleDebugPanel() {
                state.debugMode = !state.debugMode;
                const debugInfo = document.getElementById('debugInfo');
                if (debugInfo) {
                    debugInfo.style.display = state.debugMode ? 'block' : 'none';
                    if (state.debugMode) {
                        debug.updatePanel();
                    }
                }
            }

            // 清除调试日志
            function clearDebug() {
                debug.clear();
            }

            // 事件监听器
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);

            const debugToggle = document.getElementById('debugToggle');
            if (debugToggle) {
                debugToggle.addEventListener('click', toggleDebugPanel);
            }

            const clearDebugBtn = document.getElementById('clearDebug');
            if (clearDebugBtn) {
                clearDebugBtn.addEventListener('click', clearDebug);
            }

            // 页面加载完成后初始化
            document.addEventListener('DOMContentLoaded', () => {
                initTheme();
                init();
            });

        })();
    </script>
</body>

</html>
